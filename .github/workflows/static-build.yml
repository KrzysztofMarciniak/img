name: Static Build

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev \
            libpng-dev \
            libjpeg-dev \
            libwebp-dev \
            libxcb1-dev \
            libxau-dev \
            libxdmcp-dev \
            zlib1g-dev

      - name: Build static binary
        run: |
          make clean || true
          make static WITH_PNG=1 WITH_JPEG=1 WITH_WEBP=1

      - name: Verify binary is static
        run: |
          file img
          size img
          ldd img && exit 1 || echo "confirmed static (no dynamic deps)"

      - name: Rename binary for release
        run: cp img img-static-linux-x86_64

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: img-static-linux-x86_64
          generate_release_notes: true
